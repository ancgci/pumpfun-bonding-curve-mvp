# ─────────────────────────────────────────────────────────────────
# Nginx — pumpfun-bot dashboard
# Location: /etc/nginx/sites-available/pumpfun
# ─────────────────────────────────────────────────────────────────

upstream dashboard_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_VPS_IP;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Dashboard UI (Vite build output) ────────────────────────
    root /opt/agents/pumpfun-bot/dashboard-new/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Dashboard API ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://dashboard_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for longer API calls
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── WebSocket (Socket.IO) ───────────────────────────────────
    location /socket.io/ {
        proxy_pass http://dashboard_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket keep-alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Block common attack paths ───────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* (wp-admin|wp-login|xmlrpc\.php|\.env) {
        deny all;
        return 404;
    }
}
